services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: energy
      POSTGRES_USER: energy
      POSTGRES_PASSWORD: energy
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy -d energy"]
      interval: 5s
      timeout: 5s
      retries: 5

  optimizer:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://energy:energy@db:5432/energy
    volumes:
      - ./data:/data
    command: ["/data"]

volumes:
  pgdata:
